name: Frontend CI

on:
  push:
    paths:
      - 'client/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'client/**'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm install
        working-directory: client
      - run: npm run lint
        working-directory: client
      - run: npm test -- --run
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: docker build -t couponsphere/client:${{ github.sha }} .
        working-directory: client
