name: Security

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency audit
        run: |
          cd server && npm install --package-lock-only --ignore-scripts && npm audit --audit-level=high
          cd ../client && npm install --package-lock-only --ignore-scripts && npm audit --audit-level=high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dockerfile scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
