name: Backend CI

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'server/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm install
        working-directory: server
      - run: npm run lint
        working-directory: server
      - run: npm test
        working-directory: server
      - run: docker build -t couponsphere/server:${{ github.sha }} .
        working-directory: server
