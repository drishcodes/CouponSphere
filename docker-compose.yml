services:
  redis:
    image: redis:7-alpine
    container_name: couponsphere-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - couponsphere-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: couponsphere-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5005
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      FRAUD_SERVICE_URL: ${FRAUD_SERVICE_URL}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA}
      MEMORY_DB: ${MEMORY_DB}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5005:5005"
    depends_on:
      redis:
        condition: service_healthy
      fraud-microservice:
        condition: service_started
    networks:
      - couponsphere-network

  fraud-microservice:
    build:
      context: ./fraud-microservice
      dockerfile: Dockerfile
    container_name: couponsphere-fraud-microservice
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: production
      SERVER_PORT: 8080
    ports:
      - "8082:8080"
    networks:
      - couponsphere-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5005/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5005}
    container_name: couponsphere-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - couponsphere-network

volumes:
  redis_data:

networks:
  couponsphere-network:
    driver: bridge
