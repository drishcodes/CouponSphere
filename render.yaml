services:
  # 1. Frontend (Static Site)
  - type: web
    name: couponsphere-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://couponsphere-api.onrender.com/api/v1

  # 2. Backend API (Node.js)
  - type: web
    name: couponsphere-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set your Atlas URI in Render Dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://couponsphere-client.onrender.com
      - key: SEED_DEMO_DATA
        value: "true"

# Note: Managed Redis and Docker services were removed to stay within Render's Card-Free tier.
# The app will use its internal fallback logic for fraud scoring and caching.
