services:
  # 1. Frontend (Static Site)
  - type: web
    name: couponsphere-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://couponsphere-api.onrender.com/api/v1 # Update this after first deploy if needed

  # 2. Backend API (Node.js)
  - type: web
    name: couponsphere-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard
      - key: REDIS_URL
        fromValue: ${REDIS_URL}
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRAUD_SERVICE_URL
        value: http://couponsphere-fraud:8080
      - key: CLIENT_ORIGIN
        value: https://couponsphere-client.onrender.com

  # 3. Fraud Microservice (Java/Docker)
  - type: web
    name: couponsphere-fraud
    runtime: docker
    rootDir: fraud-microservice
    envVars:
      - key: SERVER_PORT
        value: 8080

# 4. Managed Redis
databases:
  - name: couponsphere-redis
    type: redis
    plan: free # Change to starter if needed
