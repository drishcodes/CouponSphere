apiVersion: apps/v1
kind: Deployment
metadata:
  name: couponsphere-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: couponsphere-client
  template:
    metadata:
      labels:
        app: couponsphere-client
    spec:
      containers:
        - name: client
          image: couponsphere/client:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: couponsphere-client
spec:
  selector:
    app: couponsphere-client
  ports:
    - port: 80
      targetPort: 80

