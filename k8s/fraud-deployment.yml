apiVersion: apps/v1
kind: Deployment
metadata:
  name: couponsphere-fraud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: couponsphere-fraud
  template:
    metadata:
      labels:
        app: couponsphere-fraud
    spec:
      containers:
        - name: fraud-service
          image: couponsphere/fraud-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: couponsphere-fraud
spec:
  selector:
    app: couponsphere-fraud
  ports:
    - port: 8080
      targetPort: 8080
