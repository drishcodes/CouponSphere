apiVersion: apps/v1
kind: Deployment
metadata:
  name: couponsphere-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: couponsphere-server
  template:
    metadata:
      labels:
        app: couponsphere-server
    spec:
      containers:
        - name: server
          image: couponsphere/server:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: couponsphere-server-env
---
apiVersion: v1
kind: Service
metadata:
  name: couponsphere-server
spec:
  selector:
    app: couponsphere-server
  ports:
    - port: 5000
      targetPort: 5000

